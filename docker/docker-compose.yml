services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: mercantec_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d mercantec_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    # Valgfrit: læg OAuth/Microsoft secrets i docker/.env (gitignoreret) — se .env.example
    # env_file: .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=mercantec_auth;Username=auth;Password=auth
      # CORS til external-spa-demo på port 5173 (kan udelades hvis appsettings.Development.json bruges fra image)
      Cors__SpaOrigins__0: http://localhost:5173
      Cors__SpaOrigins__1: http://127.0.0.1:5173
    volumes:
      - jwt_keys:/app/keys
    depends_on:
      postgres:
        condition: service_healthy

  spa:
    build:
      context: ..
      dockerfile: docker/spa.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  jwt_keys:
