services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: mercantec_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d mercantec_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    # Læg runtime config i docker/.env (gitignoreret) — se .env.example
    env_file:
      - .env
    volumes:
      - jwt_keys:/app/keys
    depends_on:
      postgres:
        condition: service_healthy

  spa:
    build:
      context: ..
      dockerfile: docker/spa.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  jwt_keys:
