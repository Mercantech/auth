<h1 style="margin:0 0 12px;font-family:{{titleFontFamily}};font-size:22px;font-weight:800;letter-spacing:-0.02em;color:{{ink}};">Nulstil adgangskode</h1>
<p style="margin:0 0 20px;font-size:15px;line-height:1.65;color:{{muted}};">Hej {{displayName}}, vi har modtaget en anmodning om at nulstille din adgangskode. Hvis det ikke var dig, kan du ignorere denne mail.</p>
<table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
  <tr>
    <td style="border-radius:{{buttonRadius}};background:{{accent}};border:{{buttonBorder}};box-shadow:{{buttonShadow}};">
      <a href="{{actionUrl}}" style="display:inline-block;padding:14px 28px;font-family:{{fontFamily}};font-size:14px;font-weight:700;text-transform:{{buttonTextTransform}};letter-spacing:{{buttonLetterSpacing}};color:#ffffff;text-decoration:none;border-radius:{{buttonRadius}};">Vælg ny adgangskode</a>
    </td>
  </tr>
</table>
<p style="margin:0 0 8px;font-size:13px;line-height:1.55;color:{{muted}};">Linket udløber om {{expiryMinutes}} minutter.</p>
<p style="margin:0;font-size:12px;line-height:1.55;word-break:break-all;color:{{muted}};">{{actionUrl}}</p>
