<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brugere — Mercantec demo</title>
  <link rel="stylesheet" href="demo-theme.css" />
</head>
<body class="demo">
  <div class="demo-wrap demo-wrap--wide">
    <nav>
      <a href="index.html">Forside</a>
      <a href="jwt.html">JWT</a>
      <a href="callback.html">Token JSON</a>
      <a href="appsettings-to-env.html">appsettings → .env</a>
      <button type="button" class="nav-logout" id="nav-logout">Log ud</button>
    </nav>
    <h1>Brugere i auth-databasen</h1>
    <p id="status">Henter…</p>
    <table id="users-table" hidden>
      <thead>
        <tr>
          <th>Navn</th>
          <th>E-mail</th>
          <th>Linkede providers</th>
          <th>Tilknyttede mails (kind)</th>
          <th>Lokalt login</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p><small>Kræver <code>Authorization: Bearer</code> med rolle <strong>Admin</strong>.</small></p>
    <p class="demo-platform-note" role="note">
      Demo ved <strong>MAGS</strong> (underviser) — ikke Mercantecs officielle produkt.
      <a href="mailto:mags@mercantec.dk">mags@mercantec.dk</a>
    </p>
  </div>

  <script src="shared-config.js"></script>
  <script src="logout.js"></script>
  <script src="users-app.js"></script>
  <script>
    document.getElementById("nav-logout").addEventListener("click", () => mercantecLogout());
  </script>
</body>
</html>
